<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caminante Andante Infinito - Ecuador</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        html, body { overflow: hidden; width: 100%; height: 100%; }

        /* CONTROL DE PANTALLAS */
        .pantalla { display: none; width: 100%; height: 100%; position: relative; }
        .activa { display: block; }

        /* 🎬 PANTALLA DE INICIO */
        #inicio {
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F7FA 50%, #F0F9FF 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 25px;
        }
        .logo-juego { font-size: 90px; animation: flotar 3s ease-in-out infinite; }
        @keyframes flotar {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        #inicio h1 { font-size: 38px; color: #1E40AF; font-weight: bold; text-align: center; }
        #inicio p { font-size: 17px; color: #374151; max-width: 320px; text-align: center; }
        .boton-iniciar {
            padding: 16px 36px;
            font-size: 20px;
            font-weight: bold;
            background: #16A34A;
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(22,163,74,0.3);
        }

        /* 🎮 PANTALLA DE JUEGO */
        #juego {
            background: #f0f0f0;
            background-image: radial-gradient(#cccccc 20%, transparent 20%);
            background-position: 0 0;
            background-size: 40px 40px;
            position: relative;
            overflow: hidden;
        }
        .barra-superior {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.95);
            border-bottom: 3px solid #16A34A;
            z-index: 100;
        }
        #puntuacion { font-size: 22px; font-weight: bold; color: #1E40AF; }
        #boton-tienda {
            padding: 8px 16px;
            background: #F59E0B;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }

        /* MENSAJE DE CHOQUE */
        #mensaje {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: white;
            padding: 25px;
            border-radius: 14px;
            border: 3px solid #16A34A;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            z-index: 200;
            display: none;
            min-width: 300px;
        }
        #mensaje h1 { font-size: 32px; color: #DC2626; margin-bottom: 8px; }
        #mensaje p { font-size: 16px; margin-bottom: 15px; color: #374151; }
        .boton {
            padding: 10px 20px;
            font-size: 16px;
            background: #16A34A;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 4px;
            font-weight: bold;
        }
        .boton-secundario { background: #1E40AF; }

        /* ELEMENTOS DEL JUEGO */
        #jugador {
            position: absolute;
            width: 50px;
            height: 70px;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-size: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .obstaculo { position: absolute; background: #6B7280; border-radius: 6px; }
        .plataforma { position: absolute; background: #854D0E; border-radius: 6px; }
        .nube { position: absolute; background: white; border-radius: 50%; opacity: 0.8; }

        /* TIENDA */
        #tienda {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 300;
            padding: 20px;
            overflow-y: auto;
        }
        .cabecera-tienda { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .cabecera-tienda h2 { color: white; font-size: 26px; }
        .boton-cerrar { background: #DC2626; color: white; border: none; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .lista-skins { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
        .tarjeta-skin {
            background: white;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border: 3px solid transparent;
        }
        .tarjeta-skin.seleccionada { border-color: #16A34A; background: #F0FDF4; }
        .tarjeta-skin.bloqueada { opacity: 0.6; cursor: not-allowed; }
        .icono-skin { font-size: 40px; margin-bottom: 6px; }
        .nombre-skin { font-weight: bold; font-size: 13px; margin-bottom: 4px; }
        .condicion-skin { font-size: 11px; color: #6B7280; }
        .desbloqueado { color: #16A34A; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

<!-- PANTALLA DE INICIO -->
<div id="inicio" class="pantalla activa">
    <div class="logo-juego">🧑‍🦰✈️</div>
    <h1>Caminante Andante Infinito</h1>
    <p>Recorre los cielos de los Andes, supera obstáculos y desbloquea personajes típicos del Ecuador 🇪🇨</p>
    <button class="boton-iniciar" onclick="empezarJuego()">EMPEZAR A JUGAR</button>
</div>

<!-- PANTALLA DE JUEGO -->
<div id="juego" class="pantalla">
    <div class="barra-superior">
        <div id="puntuacion">Altura: 0 m</div>
        <button id="boton-tienda" onclick="abrirTienda()">👕 Tienda</button>
    </div>

    <div id="mensaje">
        <h1>¡Choque!</h1>
        <p>Llegaste hasta <span id="altura-final">0</span> metros</p>
        <p id="desbloqueo-nuevo"></p>
        <button class="boton" onclick="reiniciar()">VOLVER A SUBIR</button>
        <button class="boton boton-secundario" onclick="abrirTienda()">VER TIENDA</button>
    </div>

    <div id="jugador">🇪🇨</div>
</div>

<!-- TIENDA -->
<div id="tienda" class="pantalla">
    <div class="cabecera-tienda">
        <h2>Tienda de Personajes 🇪🇨</h2>
        <button class="boton-cerrar" onclick="cerrarTienda()">✖ Cerrar</button>
    </div>
    <div class="lista-skins" id="lista-skins"></div>
</div>

<script>
// 📋 PERSONAJES
const skins = [
    { id: 'ecuador', icono: '🇪🇨', nombre: 'Ecuatoriano', minAltura: 0, desbloqueado: true },
    { id: 'sierra', icono: '🧢', nombre: 'Campesino de la Sierra', minAltura: 500, desbloqueado: false },
    { id: 'costa', icono: '🏖️', nombre: 'Montuvio de la Costa', minAltura: 1000, desbloqueado: false },
    { id: 'amazonia', icono: '🌿', nombre: 'Comunidad Shuar', minAltura: 1500, desbloqueado: false },
    { id: 'galapagos', icono: '🐢', nombre: 'Isleño de Galápagos', minAltura: 2000, desbloqueado: false },
    { id: 'chola', icono: '👒', nombre: 'Chola Cuencana', minAltura: 2500, desbloqueado: false },
    { id: 'yaravi', icono: '🎻', nombre: 'Músico Andino', minAltura: 3000, desbloqueado: false },
    { id: 'condor', icono: '🦅', nombre: 'El Cóndor Andino', minAltura: 4000, desbloqueado: false }
];

let skinActiva = 'ecuador';
let alturaMaxima = parseInt(localStorage.getItem('alturaMaxima')) || 0;

// ⚙️ VARIABLES DEL JUEGO
let velocidad = 0;
let altura = 0;
let gravedad = 0.5;
let fuerzaSalto = -12;
let jugando = false;
let obstaculos = [];
let plataformas = [];
let nubes = [];
let posX = window.innerWidth / 2;
let posY = window.innerHeight - 150;

// ELEMENTOS
const pantallaInicio = document.getElementById('inicio');
const pantallaJuego = document.getElementById('juego');
const jugador = document.getElementById('jugador');
const puntuacionTexto = document.getElementById('puntuacion');
const mensaje = document.getElementById('mensaje');
const alturaFinal = document.getElementById('altura-final');
const desbloqueoNuevo = document.getElementById('desbloqueo-nuevo');
const listaSkins = document.getElementById('lista-skins');

jugador.style.left = posX + 'px';
jugador.style.bottom = posY + 'px';

// 🚀 INICIAR JUEGO
function empezarJuego() {
    pantallaInicio.classList.remove('activa');
    pantallaJuego.classList.add('activa');
    jugando = true;
    crearElementos();
    actualizar();
}

// 🎮 CONTROLES
function saltar() { if (!jugando) return; velocidad = fuerzaSalto; }
document.addEventListener('keydown', saltar);
document.addEventListener('touchstart', saltar);
document.addEventListener('mousedown', saltar);

// 📦 CREAR ESCENARIO (MENOS ELEMENTOS, MEJOR DISTRIBUIDOS)
function crearElementos() {
    // Plataforma inicial
    let platInicio = document.createElement('div');
    platInicio.classList.add('plataforma');
    platInicio.style.width = '140px';
    platInicio.style.height = '18px';
    platInicio.style.left = (window.innerWidth/2 - 70) + 'px';
    platInicio.style.bottom = '100px';
    pantallaJuego.appendChild(platInicio);
    plataformas.push(platInicio);

    // Generar solo 40 niveles (antes eran 80, menos amontonamiento)
    for(let i = 1; i < 40; i++) {
        let nuevaPlat = document.createElement('div');
        nuevaPlat.classList.add('plataforma');
        nuevaPlat.style.width = (Math.random() * 80 + 70) + 'px';
        nuevaPlat.style.height = '14px';
        nuevaPlat.style.left = (Math.random() * (window.innerWidth - 150)) + 'px';
        nuevaPlat.style.bottom = (i * 180) + 'px'; // Más espacio entre plataformas
        pantallaJuego.appendChild(nuevaPlat);
        plataformas.push(nuevaPlat);

        // Obstáculos solo en 30% de los casos, no tan seguidos
        if(Math.random() > 0.7 && i > 5) {
            let obs = document.createElement('div');
            obs.classList.add('obstaculo');
            obs.style.width = '50px';
            obs.style.height = '50px';
            obs.style.left = (Math.random() * (window.innerWidth - 100)) + 'px';
            obs.style.bottom = (i * 180 + 40) + 'px';
            pantallaJuego.appendChild(obs);
            obstaculos.push(obs);
        }

        // Nubes decorativas
        let nube = document.createElement('div');
        nube.classList.add('nube');
        nube.style.width = (Math.random() * 100 + 60) + 'px';
        nube.style.height = '35px';
        nube.style.left = (Math.random() * window.innerWidth) + 'px';
        nube.style.bottom = (i * 250 + 80) + 'px';
        pantallaJuego.appendChild(nube);
        nubes.push(nube);
    }
}

// 🔄 BUCLE DEL JUEGO
function actualizar() {
    if (!jugando) return;
    velocidad += gravedad;
    posY -= velocidad;

    // Mover cámara suavemente
    if (posY > window.innerHeight / 2.5) {
        altura += 1;
        puntuacionTexto.textContent = 'Altura: ' + altura + ' m';
        plataformas.forEach(p => p.style.bottom = (parseInt(p.style.bottom) - 1.5) + 'px');
        obstaculos.forEach(o => o.style.bottom = (parseInt(o.style.bottom) - 1.5) + 'px');
        nubes.forEach(n => n.style.bottom = (parseInt(n.style.bottom) - 1) + 'px');
    }

    // Caída
    if (posY < -50) terminar();

    // Colisiones
    obstaculos.forEach(obs => {
        let obsX = parseInt(obs.style.left);
        let obsY = parseInt(obs.style.bottom);
        if (posX > obsX - 20 && posX < obsX + 50 && posY > obsY - 60 && posY < obsY + 50) terminar();
    });

    plataformas.forEach(plat => {
        let platX = parseInt(plat.style.left);
        let platY = parseInt(plat.style.bottom);
        if (velocidad > 0 && posX > platX - 20 && posX < platX + parseInt(plat.style.width) && posY > platY - 70 && posY < platY + 10) {
            velocidad = fuerzaSalto;
        }
    });

    jugador.style.bottom = posY + 'px';
    requestAnimationFrame(actualizar);
}

// 📉 TERMINAR
function terminar() {
    jugando = false;
    alturaFinal.textContent = altura;
    mensaje.style.display = 'block';

    if (altura > alturaMaxima) {
        alturaMaxima = altura;
        localStorage.setItem('alturaMaxima', alturaMaxima);
    }

    let desbloqueado = skins.find(s => !s.desbloqueado && altura >= s.minAltura);
    desbloqueoNuevo.textContent = desbloqueado ? `🎉 ¡Desbloqueaste a ${desbloqueado.nombre}!` : '';
    desbloqueoNuevo.style.color = '#16A34A';
}

// 🔁 REINICIAR
function reiniciar() {
    obstaculos.forEach(o => o.remove());
    plataformas.forEach(p => p.remove());
    nubes.forEach(n => n.remove());
    obstaculos = [];
    plataformas = [];
    nubes = [];
    mensaje.style.display = 'none';

    velocidad = 0;
    altura = 0;
    posX = window.innerWidth / 2;
    posY = window.innerHeight - 150;
    jugando = true;
    crearElementos();
    actualizar();
}

// 👕 TIENDA
function cargarTienda() {
    listaSkins.innerHTML = '';
    skins.forEach(skin => {
        if (!skin.desbloqueado && alturaMaxima >= skin.minAltura) skin.desbloqueado = true;
        const tarjeta = document.createElement('div');
        tarjeta.className = `tarjeta-skin ${skin.id === skinActiva ? 'seleccionada' : ''} ${!skin.desbloqueado ? 'bloqueada' : ''}`;
        tarjeta.innerHTML = `
            <div class="icono-skin">${skin.icono}</div>
            <div class="nombre-skin">${skin.nombre}</div>
            ${skin.desbloqueado ? '<div class="desbloqueado">✅ Desbloqueado</div>' : `<div class="condicion-skin">🔒 ${skin.minAltura}m</div>`}
        `;
        if (skin.desbloqueado) tarjeta.onclick = () => { skinActiva = skin.id; jugador.textContent = skin.icono; cargarTienda(); };
        listaSkins.appendChild(tarjeta);
    });
}

function abrirTienda() { pantallaJuego.classList.remove('activa'); document.getElementById('tienda').classList.add('activa'); cargarTienda(); }
function cerrarTienda() { document.getElementById('tienda').classList.remove('activa'); pantallaJuego.classList.add('activa'); }
</script>
</body>
</html>
